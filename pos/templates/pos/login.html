<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lekali Java</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-shapes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .shape1 { position: absolute; width: 400px; height: 400px; background: rgba(56, 189, 248, 0.15); filter: blur(80px); top: -100px; left: -100px; border-radius: 50%; }
        .shape2 { position: absolute; width: 300px; height: 300px; background: rgba(16, 185, 129, 0.15); filter: blur(80px); bottom: -50px; right: -50px; border-radius: 50%; }
        
        .login-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 50px 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: slideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(40px); }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        
        .form-control { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; }
        .form-control:focus { background: rgba(255,255,255,0.1); border-color: #38bdf8; box-shadow: none; color: white; }
        .form-floating label { color: #94a3b8; }
        .btn-modern { background: linear-gradient(to right, #38bdf8, #0ea5e9); border: none; border-radius: 12px; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3); }
    </style>
</head>
<body>
    <div class="bg-shapes"><div class="shape1"></div><div class="shape2"></div></div>
    
    <div class="login-card text-center text-white">
        <h2 class="fw-bold mb-1">Lekali Java</h2>
        <p class="text-white-50 mb-4 small">Enterprise Point of Sale</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-floating mb-3">
                <input type="text" name="username" class="form-control" id="floatingInput" placeholder="Username" required>
                <label for="floatingInput">Username</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                <label for="floatingPassword">Password</label>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold btn-modern py-3">Access Terminal</button>
        </form>
        {% if form.errors %}<div class="alert alert-danger mt-4 small border-0 bg-danger bg-opacity-25 text-danger rounded-3">Invalid credentials.</div>{% endif %}
    </div>
</body>
</html>
